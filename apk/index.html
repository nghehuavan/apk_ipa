<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>APK Installer</title>
  <!-- Link to Bootstrap 5 CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/css/bootstrap.min.css">
</head>

<body>
  <div class="container mt-5" id="content">

  </div>
  <div class="d-none" id="template">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card">
          <div class="card-body d-flex justify-content-center">
            <a href="[link]" class="btn btn-primary">[text]</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS (optional, only if needed) -->
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/js/bootstrap.min.js"></script>

  <script>
    (async () => {
      try {
        const host = window.location.hostname;
        const acc = host.split('.')[0];
        
        // Cleanly split the pathname and remove empty segments or 'index.html'
        let splits = window.location.pathname.split('/').filter(e => e && e !== "index.html");
        
        if (splits.length < 1) {
          throw new Error("Invalid path configuration");
        }

        const repo = splits.shift();
        const subpath = splits.join('/');
        const appURL = `https://api.github.com/repos/${acc}/${repo}/contents/${subpath}`;
        
        const response = await fetch(appURL);
        const data = await response.json();
        console.log(data);
        
        let template = document.getElementById('template').innerHTML;
        let htmlList = '';

        if (Array.isArray(data)) {
          const files = data.reverse();
          
          // Construct the base path for links safely
          let basePath = window.location.pathname;
          if (basePath.endsWith('index.html')) {
            basePath = basePath.substring(0, basePath.length - 'index.html'.length);
          }
          if (!basePath.endsWith('/')) {
            basePath += '/';
          }

          for (let file of files) {
            // Only list .apk files
            if (file.type === "file" && file.name.endsWith('.apk')) {
              htmlList += template.replace('[link]', `${basePath}${file.name}`).replace('[text]', `${file.name}`);
            }
          }

          if (htmlList === '') {
            htmlList = '<p class="text-center mt-4">Không tìm thấy file APK nào.</p>';
          }
        } else {
          // Handle non-array response (e.g., API rate limit exceeded)
          console.error("GitHub API Error:", data);
          htmlList = `<p class="text-center text-danger mt-4">Lỗi tải danh sách file: ${data.message || 'Lỗi không xác định'}. <br><small>Có thể do quá giới hạn truy cập API của GitHub (Rate Limit).</small></p>`;
        }
        
        document.getElementById("content").innerHTML = '<h1 class="text-center">APK Installer</h1>' + htmlList;
      } catch (err) {
        console.error("Execution Error:", err);
        document.getElementById("content").innerHTML = `<h1 class="text-center">APK Installer</h1><p class="text-center text-danger mt-4">Đã xảy ra lỗi: ${err.message}</p>`;
      }
    })();
  </script>

</body>

</html>
